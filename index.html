<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tessa666 - Portofolio</title>
    <style>
        /* Menghilangkan margin dan padding bawaan browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah scroll ganda */
            background-color: #000; /* Warna latar belakang selagi loading */
        }

        /* Styling untuk container iframe agar memenuhi layar */
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Opsional: Loading indicator */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: Arial, sans-serif;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Overlay loading (akan hilang setelah konten dimuat) -->
    <div id="loader" class="loading-overlay">
        <p>Memuat konten...</p>
    </div>

    <div class="iframe-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwXsM1njSy5XixJ6wbNoz7LhGs1rC-wdI2RkAZykz3bmjvhszJHv0sF6tSRKAOWpgw/exec" 
            id="site-iframe"
            title="Tessa666 Blog"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Logika untuk menyembunyikan loader saat iframe selesai dimuat
        const iframe = document.getElementById('site-iframe');
        const loader = document.getElementById('loader');

        iframe.onload = function() {
            loader.classList.add('hidden');
        };
    </script>
</body>
</html>
